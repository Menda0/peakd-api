name: Publish to ECR

on:
  push:
    branches:
      - main
      - dev

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: 394754814010.dkr.ecr.eu-central-1.amazonaws.com
  ECR_REPOSITORY: peakd/api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        run: |
          registry="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}"
          tags="${registry}:${{ github.sha }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            tags="${tags},${registry}:latest,${registry}:prod"
          else
            tags="${tags},${registry}:dev"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
