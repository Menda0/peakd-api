name: Publish to ECR

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: 394754814010.dkr.ecr.eu-central-1.amazonaws.com
  ECR_REPOSITORY: peakd/api

# Deploy job secrets (per GitHub environment: production / development):
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (same as build; used for ECR login on server)
# DEPLOY_PATH: server directory where docker compose is already configured (no file sync)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        run: |
          registry="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}"
          tags="${registry}:${{ github.sha }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            tags="${tags},${registry}:latest,${registry}:prod"
          else
            tags="${tags},${registry}:dev"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION,ECR_REGISTRY,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH}"
            aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" \
              | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
            docker compose pull
            docker compose down
            docker compose up -d
